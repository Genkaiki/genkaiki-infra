networks:
  sonarqube:
  genkaiki-proxy:
    external: true

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_postgres:

services:
  sonarqube:
    image: sonarqube:community
    restart: always
    depends_on:
      sonarqube-postgres:
        condition: service_healthy
    ports:
      - 9000:9000
    networks:
      - sonarqube
      - genkaiki-proxy
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-postgres:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  sonarqube-postgres:
    image: postgres:15
    restart: always
    networks:
      - sonarqube
    volumes:
      - sonarqube_postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

