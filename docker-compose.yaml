networks:
  genkaiki-proxy:
    driver: bridge
  penpot:
  sonarqube:

volumes:
  penpot_postgres_v15:
  penpot_assets:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_postgres:

x-penpot-flags: &penpot-flags
  PENPOT_FLAGS: disable-email-verification disable-secure-session-cookies enable-smtp enable-prepl-server enable-mcp

x-penpot-uri: &penpot-uri
  PENPOT_PUBLIC_URI: http://localhost:9001

x-penpot-body: &penpot-body
  PENPOT_HTTP_SERVER_MAX_BODY_SIZE: 367001600
  PENPOT_HTTP_SERVER_MAX_MULTIPART_BODY_SIZE: 367001600

x-penpot-secret: &penpot-secret
  PENPOT_SECRET_KEY: dbc-penpot-local-secret-key-change-in-prod

services:

  # ── NGINX ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - 80:80
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - genkaiki-proxy
    depends_on:
      - penpot-frontend
      - sonarqube

  # ── CLOUDFLARE TUNNEL ──────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    networks:
      - genkaiki-proxy
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx

  # ── PENPOT ─────────────────────────────────────────────
  penpot-frontend:
    image: "penpotapp/frontend:2.15"
    restart: always
    ports:
      - 9001:8080
    volumes:
      - penpot_assets:/opt/data/assets
    depends_on:
      - penpot-backend
      - penpot-exporter
      - penpot-mcp
    networks:
      - penpot
      - genkaiki-proxy

  penpot-backend:
    image: "penpotapp/backend:2.15"
    restart: always
    volumes:
      - penpot_assets:/opt/data/assets
    depends_on:
      - penpot-postgres
      - penpot-valkey
    networks:
      - penpot
    environment:
      <<: [*penpot-flags, *penpot-uri, *penpot-body, *penpot-secret]
      PENPOT_DATABASE_URI: postgresql://penpot-postgres/penpot
      PENPOT_DATABASE_USERNAME: penpot
      PENPOT_DATABASE_PASSWORD: penpot
      PENPOT_REDIS_URI: redis://penpot-valkey/0
      PENPOT_ASSETS_STORAGE_BACKEND: assets-fs
      PENPOT_STORAGE_ASSETS_FS_DIRECTORY: /opt/data/assets
      PENPOT_TELEMETRY_ENABLED: false
      PENPOT_SMTP_DEFAULT_FROM: no-reply@example.com
      PENPOT_SMTP_DEFAULT_REPLY_TO: no-reply@example.com
      PENPOT_SMTP_HOST: penpot-mailcatch
      PENPOT_SMTP_PORT: 1025
      PENPOT_SMTP_SSL: false
      PENPOT_SMTP_TLS: false

  penpot-exporter:
    image: "penpotapp/exporter:2.15"
    restart: always
    networks:
      - penpot
    environment:
      PENPOT_PUBLIC_URI: http://penpot-frontend:8080
      PENPOT_REDIS_URI: redis://penpot-valkey/0

  penpot-mcp:
    image: "penpotapp/mcp:2.15"
    restart: always
    ports:
      - 7070:7070
    networks:
      - penpot
    environment:
      PENPOT_MCP_PENPOT_BASE_URL: http://penpot-backend:6060
      PENPOT_MCP_PORT: 7070

  penpot-postgres:
    image: "penpotapp/postgres:15"
    restart: always
    stop_signal: SIGINT
    networks:
      - penpot
    volumes:
      - penpot_postgres_v15:/var/lib/postgresql/data
    environment:
      POSTGRES_INITDB_ARGS: --data-checksums
      POSTGRES_DB: penpot
      POSTGRES_USER: penpot
      POSTGRES_PASSWORD: penpot

  penpot-valkey:
    image: "valkey/valkey:8"
    restart: always
    networks:
      - penpot
    command: valkey-server --appendonly yes

  penpot-mailcatch:
    image: sj26/mailcatcher:latest
    restart: always
    networks:
      - penpot
    ports:
      - 1080:1080

  # ── SONARQUBE ──────────────────────────────────────────
  sonarqube:
    image: sonarqube:community
    restart: always
    depends_on:
      sonarqube-postgres:
        condition: service_healthy
    ports:
      - 9000:9000
    networks:
      - sonarqube
      - genkaiki-proxy
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-postgres:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  sonarqube-postgres:
    image: postgres:15
    restart: always
    networks:
      - sonarqube
    volumes:
      - sonarqube_postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 10s
      timeout: 5s
      retries: 5
